services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tgcasino
      POSTGRES_USER: sabinka
      POSTGRES_PASSWORD: sabinka
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sabinka -d tgcasino"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgres://sabinka:sabinka@postgres:5432/tgcasino?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
